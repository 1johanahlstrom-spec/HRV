<!DOCTYPE html><html lang="sv"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>HRV capture-motor</title>
<style>
  html,body{background:#08090C;color:#00F082;font:15px/1.4 monospace;margin:0;padding:14px}
  #big{font-size:30px;font-weight:bold}
  #sub{font-size:13px;color:#8a8f98;margin-top:4px}
  #log{font-size:11px;color:#5a6a5a;white-space:pre-wrap;margin-top:10px}
  /* Redirect-robusthet (item #1-fix): tappbar resultat-länk vid mätslut → färsk user-gesture
     så Chrome dispatchar hrvresult:// pålitligt (auto-fyr utan gest är flaky). */
  #resultBtn{display:none;margin-top:22px;padding:20px 16px;background:#00F082;color:#08090C;
    font-size:22px;font-weight:bold;text-align:center;text-decoration:none;border-radius:14px}
  video{width:120px;height:90px;border:1px solid #222;margin-top:10px}
  canvas{display:none}
</style></head>
<body>
<div id="big">startar…</div>
<div id="sub">capture-motor (Väg B) — host äger torch</div>
<a id="resultBtn" href="#">Visa resultat →</a>
<div id="log"></div>
<video id="V" autoplay playsinline muted></video>
<canvas id="C" width="32" height="24"></canvas>

<script type="module">
// ════════════════════════════════════════════════════════════════════════
// HRV CAPTURE-MOTOR (capture-only) — produktifiering steg 2, item #1.
//
// "Webben = osynlig capture-motor": denna sida har INGET resultat-UI. Den
// kör EXAKT samma DSP-pipeline som den fulla webb-appen (app.js tick(),
// bit-för-bit via dsp.js) headless, och vid mätslut NAVIGERAR den till
// custom-scheme hrvresult:// med RR-listan (extractRRI-utdata). Chrome (TWA)
// avfyrar den externa intenten → native BridgeResultActivity tar emot,
// kör HRVMetrics.compute + qualityOf (den ärliga gaten är native IP) och
// ritar Compose-resultatet.
//
// TORCH: host-FG-service äger torch (setTorchMode Order 1, FÖRE getUserMedia).
// Sidan begär ALDRIG torch själv (JS-torch kräver gest + funkar ej på denna
// S22+ Chrome — hela projektets fynd). Vi mäter bara rMean som torch-proof.
// ════════════════════════════════════════════════════════════════════════
import { D } from './js/dsp.js';

const BIG = document.getElementById('big');
const SUB = document.getElementById('sub');
const LOG = document.getElementById('log');
const V   = document.getElementById('V');
const C   = document.getElementById('C');
const cx  = C.getContext('2d', { willReadFrequently: true });

// Mät-parametrar — speglar app.js (SETTLE 3s, DUR 60s). Host-FGS-fönstret är
// 65s, så 60s lämnar marginal innan torch släcks.
const SETTLE = 3, DUR = 60;

// Pipeline-state (samma namn/roller som app.js)
let raw = [], rawG = [], rawB = [], ts = [];
let flt = [], pks = [], rri = [], hrv = null;
let sqi = 0, sqiHist = [], co = null;
let fps = 30, t0 = 0, stm = null, wl = null, fired = false;

function log(m) { LOG.textContent += m + '\n'; }

async function start() {
  try { wl = await navigator.wakeLock.request('screen'); } catch (_) {}
  // Samma getUserMedia-config som app.js/_twacap: bakkamera, 160×120, 60fps-ideal.
  const cfgs = [
    { facingMode: 'environment', width: { ideal: 160 }, height: { ideal: 120 }, frameRate: { ideal: 60, min: 30 } },
    { facingMode: 'environment' }, true,
  ];
  for (let i = 0; i < cfgs.length; i++) {
    try { stm = await navigator.mediaDevices.getUserMedia({ video: cfgs[i] }); break; }
    catch (e) { if (i === cfgs.length - 1) { BIG.textContent = 'getUserMedia FAIL ' + e.name; return; } }
  }
  const tk = stm.getVideoTracks()[0], se = tk.getSettings();
  fps = se.frameRate || 30; co = D.bp4(fps, 0.5, 4);
  SUB.textContent = 'capturar ' + (se.width || '?') + 'x' + (se.height || '?') + '@' + Math.round(fps) + ' — host-torch';
  V.srcObject = stm; await V.play();
  t0 = performance.now();
  requestAnimationFrame(tick);
}

// Headless spegling av app.js tick() — DSP körs på hela bufferten varje frame
// (app.js är ej inkrementell: flt = D.ff(detrend(hela combined)) per tick), så
// rri/hrv är alltid de slutgiltiga vid mätslut.
function tick() {
  if (!stm) return;
  cx.drawImage(V, 0, 0, 32, 24);
  const px = cx.getImageData(4, 4, 24, 16).data;       // central 24×16 ROI (= app.js)
  let rS = 0, gS = 0, bS = 0, n = 0;
  for (let i = 0; i < px.length; i += 4) { rS += px[i]; gS += px[i + 1]; bS += px[i + 2]; n++; }
  const rA = rS / n, gA = gS / n, bA = bS / n;
  const ok = rA > 100 && rA > bA * 1.3 && rA > gA * 1.05;   // finger-OK-gate (= app.js)

  const elapsed = (performance.now() - t0) / 1e3;
  const settling = elapsed < SETTLE;

  if (ok && !settling) {
    raw.push(rA); rawG.push(gA); rawB.push(bA); ts.push(performance.now());
    if (ts.length > 60) {
      const l = ts.slice(-60);
      fps = 1e3 / ((l[l.length - 1] - l[0]) / (l.length - 1)); co = D.bp4(fps, 0.5, 4);
    }
    if (raw.length > fps * 2) {
      const combined = new Float64Array(raw.length);
      for (let i = 0; i < raw.length; i++) combined[i] = raw[i] * 0.4 + rawG[i] * 0.6;
      const detrended = D.detrend(combined, 2, fps);
      flt = Array.from(D.ff(detrended, co));
      const motionClean = D.detectMotion(rawB, fps, 0.5);
      pks = D.fp(flt, Math.round(fps * 0.45));
      const sqiResult = D.sq(flt, pks, fps);
      sqi = sqiResult.score; sqiHist.push(sqi); if (sqiHist.length > 5) sqiHist.shift();
      if (pks.length >= 3) {
        rri = D.extractRRI(flt, pks, ts, sqiResult, motionClean);
        hrv = D.hrv(rri);
      }
    }
  }

  BIG.textContent = 'R=' + rA.toFixed(0) + (rA > 100 ? ' ✓' : rA < 5 ? ' ✗SVART' : '')
    + '  ' + Math.floor(elapsed) + 's' + (hrv ? '  ~' + hrv.bpm + ' bpm' : '');
  if (elapsed >= DUR) { finish(); return; }
  requestAnimationFrame(tick);
}

// Mätslut → bygg deep-link med RR-listan (extractRRI-utdata) + diagnostik, navigera.
// Fyrar ALLTID (även tunn signal → tom rri) så native kan visa en ärlig
// NoSignal/TooFew istället för att hänga.
function finish() {
  if (fired) return; fired = true;
  if (stm) { stm.getTracks().forEach(t => t.stop()); stm = null; }
  if (wl) { try { wl.release(); } catch (_) {} wl = null; }

  // rriList = D.extractRRI-utdata (SQI ±40% + motion + 333-1500), heltals-avrundad. Vi
  // skickar denna PRE-cleanRR-lista med flit: native validatePhysiological kör ±20%/±25%-
  // rensningen (= webbens cleanRR) → rejection + Noisy räknas natively (single source of truth).
  const rriList = (rri || []).map(x => Math.round(x));
  const rMean = raw.length ? Math.round(raw.reduce((a, b) => a + b, 0) / raw.length) : 0;
  const dur   = Math.min(Math.round((performance.now() - t0) / 1e3), DUR);
  const sqiF  = sqiHist.length ? Math.round(sqiHist.reduce((a, b) => a + b, 0) / sqiHist.length) : Math.round(sqi);
  const rej   = hrv ? hrv.rej : 0;

  // w*-fält = webbens egen D.hrv (DIAGNOSTIK för live-port-paritet). Native IGNORERAR dem
  // för gate/visning (native räknar själv på rri) — de loggas bara så webb-vs-native kan
  // jämföras på en riktig device-mätning (BridgeResultActivity "PARITET"-rader i logcat).
  const webHrv = hrv
    ? '&wbpm=' + hrv.bpm + '&wrmssd=' + hrv.rmssd + '&wsdnn=' + hrv.sdnn
      + '&wpnn50=' + hrv.pnn50 + '&wmean=' + hrv.meanRR + '&wcount=' + hrv.count
    : '';
  const url = 'hrvresult://done?rri=' + rriList.join(',')
    + '&rej=' + rej + '&sqi=' + sqiF + '&fps=' + fps.toFixed(0)
    + '&rMean=' + rMean + '&dur=' + dur + webHrv;

  // REDIRECT-ROBUSTHET (item #1-fix): fyra EJ location.href automatiskt — Chrome dispatchar
  // external-scheme-navigering (hrvresult://) OPÅLITLIGT utan FÄRSK user-activation (device-
  // verifierat: auto-fyr efter 60s utan beröring fyrar ibland, ibland ej). Visa istället en
  // tappbar länk: tap = user-gesture → Chrome avfyrar intenten 100%. EN tap vid mätslut,
  // deterministiskt. <a href> (ej JS location.href) = mest browser-nativa app-launch-vägen.
  BIG.textContent = 'Mätning klar — ' + rriList.length + ' RR';
  SUB.textContent = 'Tryck för att se ditt resultat ↓';
  log('redo (tryck knappen): ' + url);
  const btn = document.getElementById('resultBtn');
  btn.setAttribute('href', url);
  btn.style.display = 'block';
}

window.addEventListener('load', start);
</script>
</body></html>
